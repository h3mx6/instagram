<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="phone-container">
                <img src="https://www.instagram.com/static/images/homepage/home-phones.png/43b71f5c7c8d.png" alt="Instagram phones" class="phones">
            </div>
            <div class="form-container">
                <form id="loginForm">
                    <div class="logo">
                        <i class="fab fa-instagram"></i>
                        <h1>Instagram</h1>
                    </div>
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Phone number, username, or email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-btn">Log in</button>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    
                    <div class="facebook-login">
                        <i class="fab fa-facebook-square"></i>
                        <span>Log in with Facebook</span>
                    </div>
                    
                    <div class="forgot-password">
                        <a href="#">Forgot password?</a>
                    </div>
                </form>
                
                <div class="signup">
                    <p>Don't have an account? <a href="#">Sign up</a></p>
                </div>
                
                <div class="get-app">
                    <p>Get the app.</p>
                    <div class="app-buttons">
                        <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/4b70f6f6a48a.png" alt="Download on App Store">
                        <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/8f6f3e1c2b7a.png" alt="Get it on Google Play">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-links">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Top Accounts</a>
                <a href="#">Hashtags</a>
                <a href="#">Locations</a>
                <a href="#">Instagram Lite</a>
            </div>
            <div class="footer-copyright">
                <select>
                    <option>English</option>
                    <option>Hindi</option>
                    <option>Spanish</option>
                </select>
                <span>© 2024 Instagram from Meta</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
